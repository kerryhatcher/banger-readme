<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <!-- Decorative geometric shapes -->
  <circle cx="1050" cy="50" r="120" fill="#F0F9FF" opacity="0.03"/>
  <circle cx="1100" cy="250" r="80" fill="#F0F9FF" opacity="0.05"/>
  <rect x="50" y="200" width="200" height="200" rx="20" fill="#F0F9FF" opacity="0.03" transform="rotate(15 150 300)"/>
  <!-- Terminal window (left) -->
  <rect x="80" y="70" width="340" height="180" rx="12" fill="#0F172A" opacity="0.7"/>
  <circle cx="100" cy="90" r="5" fill="#F43F5E"/>
  <circle cx="116" cy="90" r="5" fill="#F59E0B"/>
  <circle cx="132" cy="90" r="5" fill="#059669"/>
  <text x="100" y="130" font-family="system-ui, -apple-system, monospace" font-size="18" font-weight="bold" fill="#06B6D4">$</text>
  <text x="118" y="130" font-family="system-ui, -apple-system, monospace" font-size="18" font-weight="bold" fill="#F0F9FF">rmb score .</text>
  <rect x="100" y="148" width="280" height="4" rx="2" fill="#2563EB" opacity="0.4"/>
  <rect x="100" y="160" width="240" height="4" rx="2" fill="#2563EB" opacity="0.3"/>
  <rect x="100" y="172" width="260" height="4" rx="2" fill="#2563EB" opacity="0.2"/>
  <rect x="100" y="190" width="200" height="4" rx="2" fill="#059669" opacity="0.5"/>
  <rect x="100" y="202" width="180" height="4" rx="2" fill="#059669" opacity="0.3"/>
  <text x="100" y="230" font-family="system-ui, -apple-system, monospace" font-size="14" fill="#94A3B8">README Score: 85/100 [A]</text>
  <!-- Title (right) -->
  <text x="480" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="url(#textGrad)" letter-spacing="-1">rmb</text>
  <text x="480" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94A3B8" letter-spacing="1">README BANGER</text>
  <text x="480" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B">Install plugins for Pi &amp; Claude Code. Score READMEs against best practices.</text>
  <!-- Bottom accent line -->
  <rect x="480" y="245" width="80" height="3" rx="1.5" fill="#06B6D4"/>
</svg>
