<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="4" y="4" width="112" height="112" rx="24" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="20" y="28" width="80" height="64" rx="8" fill="#0F172A" opacity="0.6"/>
  <!-- Terminal title bar dots -->
  <circle cx="30" cy="38" r="3.5" fill="#F43F5E"/>
  <circle cx="40" cy="38" r="3.5" fill="#F59E0B"/>
  <circle cx="50" cy="38" r="3.5" fill="#059669"/>
  <!-- Command text -->
  <text x="30" y="58" font-family="system-ui, -apple-system, monospace" font-size="13" font-weight="bold" fill="#06B6D4">$</text>
  <text x="42" y="58" font-family="system-ui, -apple-system, monospace" font-size="13" font-weight="bold" fill="#F0F9FF">rmb</text>
  <text x="68" y="58" font-family="system-ui, -apple-system, monospace" font-size="13" fill="#94A3B8">install</text>
  <!-- Output lines -->
  <rect x="30" y="66" width="55" height="3" rx="1.5" fill="#2563EB" opacity="0.5"/>
  <rect x="30" y="73" width="40" height="3" rx="1.5" fill="#2563EB" opacity="0.3"/>
  <rect x="30" y="80" width="48" height="3" rx="1.5" fill="#2563EB" opacity="0.2"/>
  <!-- Checkmark -->
  <circle cx="88" cy="76" r="10" fill="url(#accent)"/>
  <path d="M83 76l3.5 3.5 6.5-6.5" stroke="#F0F9FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
