<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="rmb score dial logo">
  <title>rmb</title>
  <defs>
    <linearGradient id="lbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="50%" stop-color="#5a1a80"/>
      <stop offset="100%" stop-color="#ff5f6d"/>
    </linearGradient>
    <linearGradient id="ldialTrack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a2a70"/>
      <stop offset="100%" stop-color="#3a1e58"/>
    </linearGradient>
    <linearGradient id="ldialFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe14d"/>
      <stop offset="50%" stop-color="#ff8a1e"/>
      <stop offset="100%" stop-color="#ff3d7f"/>
    </linearGradient>
    <radialGradient id="lglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd23f" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffd23f" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="lclip"><rect x="0" y="0" width="120" height="120" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#lclip)">
    <rect x="0" y="0" width="120" height="120" fill="url(#lbg)"/>
    <circle cx="60" cy="60" r="58" fill="url(#lglow)"/>

    <!-- starburst -->
    <g transform="translate(60,60)" opacity="0.45">
      <path d="M0,-56 L4,-16 L40,-38 L11,-7 L55,2 L10,8 L37,41 L3,13 L-2,56 L-7,13 L-40,38 L-9,7 L-57,-3 L-10,-6 L-38,-40 L-3,-15 Z" fill="#ffd23f"/>
    </g>

    <!-- confetti -->
    <circle cx="14" cy="20" r="3" fill="#3ee8d0"/>
    <rect x="98" y="14" width="7" height="7" rx="1.5" fill="#ffd23f" transform="rotate(20 101 17)"/>
    <circle cx="106" cy="100" r="3.5" fill="#ff8a1e"/>
    <rect x="10" y="96" width="6" height="6" rx="1.5" fill="#8b5cf6" transform="rotate(-18 13 99)"/>

    <!-- dial -->
    <g transform="translate(60,60)">
      <circle r="46" fill="none" stroke="url(#ldialTrack)" stroke-width="11"/>
      <circle r="46" fill="none" stroke="url(#ldialFill)" stroke-width="11" stroke-linecap="round"
              stroke-dasharray="260 289" transform="rotate(-90)"/>
      <text x="0" y="10" text-anchor="middle" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-weight="800" font-size="38" fill="#ffffff">A</text>
    </g>
  </g>
</svg>
